<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Gran Revelación - Una Aventura Mágica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --pink-glow: rgba(255, 105, 180, 0.6);
            --blue-glow: rgba(30, 144, 255, 0.6);
            --gold-glow: rgba(255, 215, 0, 0.8);
            --text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Outfit', 'Nunito', system-ui, sans-serif;
            color: #fff;
        }

        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .sky-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1e36 0%, #05070f 100%);
            opacity: 0;
            z-index: 0;
        }

        .moon {
            position: absolute;
            top: 5%;
            right: 8%;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #fffbf0 0%, #f3e5ab 70%);
            border-radius: 50%;
            box-shadow: 0 0 40px #fffbf0, inset -5px -5px 10px rgba(0,0,0,0.1);
            opacity: 0;
            z-index: 2;
        }

        @media (min-width: 768px) {
            .moon { width: 120px; height: 120px; top: 10%; right: 10%; }
        }

        #start-prompt {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 150;
            cursor: pointer;
            text-align: center;
            padding: 20px;
        }

        .prompt-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff9a9e, #a1c4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .prompt-sub {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            animation: pulseText 1.8s infinite ease-in-out;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .intro-container {
            position: absolute;
            width: 90%;
            max-width: 800px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .typewriter-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.5;
            text-shadow: var(--text-shadow);
            background: linear-gradient(45deg, #fff, #f3e5ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
        }

        @media (min-width: 768px) {
            .typewriter-text { font-size: 2.2rem; }
        }

        .footprint {
            position: absolute;
            width: 25px;
            height: 25px;
            opacity: 0;
            z-index: 3;
            fill: url(#footprint-grad);
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
        }

        .characters-stage {
            position: absolute;
            bottom: 8%;
            width: 100%;
            max-width: 600px;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 0 15px;
            z-index: 5;
            display: none;
            justify-items: center;
            align-items: flex-end;
        }

        .character-wrapper {
            position: relative;
            width: 100%;
            max-width: 110px;
            aspect-ratio: 1 / 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .char-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .dialogue-bubble {
            position: absolute;
            top: -75px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            opacity: 0;
            transform: scale(0.8);
            z-index: 100;
            width: 130px;
            text-align: center;
            pointer-events: none;
        }

        .dialogue-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.15) transparent;
            display: block;
            width: 0;
        }

        @media (min-width: 768px) {
            .dialogue-bubble { font-size: 1rem; width: 190px; top: -90px; padding: 15px 20px; }
            .characters-stage { max-width: 90%; display: flex; justify-content: space-around; gap: 0; }
            .character-wrapper { width: 140px; height: 180px; }
        }

        .btn-magico {
            position: absolute;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
            background-size: 200% auto;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 40px rgba(255,255,255,0.2);
            z-index: 20;
            display: none;
            opacity: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 85%;
            max-width: 340px;
            text-align: center;
        }

        @media (min-width: 768px) {
            .btn-magico { padding: 20px 50px; font-size: 1.8rem; width: auto; max-width: none; }
        }

        #box-stage {
            position: absolute;
            width: 220px;
            height: 220px;
            z-index: 15;
            cursor: pointer;
            display: none;
            transform-style: preserve-3d;
        }

        @media (min-width: 768px) {
            #box-stage { width: 300px; height: 300px; }
        }

        .gift-box {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #slot-machine-container {
            position: absolute;
            width: 88%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 3px solid rgba(255,255,255,0.25);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,255,255,0.1);
            display: none;
            z-index: 25;
            opacity: 0;
            transform: scale(0.5);
            flex-direction: column;
            align-items: center;
        }

        .slot-header-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .slot-header-text { font-size: 1.5rem; margin-bottom: 20px; }
            #slot-machine-container { padding: 30px; border-radius: 40px; }
        }

        .reels-container {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            width: 100%;
            justify-content: center;
        }

        .reel {
            width: 28%;
            max-width: 100px;
            height: 90px;
            background: linear-gradient(to bottom, #111, #222 50%, #111);
            border-radius: 12px;
            border: 2px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 800;
            overflow: hidden;
            position: relative;
        }

        @media (min-width: 768px) {
            .reel { height: 120px; font-size: 1.4rem; border-radius: 16px; }
        }

        .reel-viewport {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s linear;
        }

        .reel-item {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 8px rgba(255,255,255,0.8);
            white-space: nowrap;
        }

        @media (min-width: 768px) {
            .reel-item { height: 120px; }
        }

        /* PALANCA MEJORADA: Mayor área táctil (padding) para evitar fallos en móviles */
        .lever-mechanism {
            position: absolute;
            right: -35px;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 140px;
            cursor: pointer;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Previene scroll involuntario al arrastrar */
        }

        @media (min-width: 768px) {
            .lever-mechanism { right: -55px; height: 170px; width: 60px; }
        }

        .lever-slot {
            width: 12px;
            height: 90px;
            background: #111;
            border-radius: 10px;
            position: relative;
            border: 2px solid rgba(255,255,255,0.2);
        }

        @media (min-width: 768px) {
            .lever-slot { width: 14px; height: 110px; }
        }

        .lever-stick {
            width: 6px;
            height: 75px;
            background: linear-gradient(90deg, #ccc, #fff, #888);
            position: absolute;
            top: 0;
            left: 1px;
            transform-origin: bottom center;
            border-radius: 4px;
            pointer-events: none; /* Delega el toque al contenedor principal */
        }

        @media (min-width: 768px) {
            .lever-stick { width: 8px; height: 90px; left: 1px; }
        }

        .lever-ball {
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #ff5e62, #ff1e27);
            border-radius: 50%;
            position: absolute;
            top: -22px;
            left: -11px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 10px #ff5e62;
        }

        @media (min-width: 768px) {
            .lever-ball { width: 34px; height: 34px; top: -28px; left: -13px; }
        }

        #flash-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .eye { transform-origin: center; animation: blink 4s infinite; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
    </style>
</head>
<body>

    <div id="start-prompt">
        <div class="prompt-title">🌟 LA GRAN REVELACIÓN 🌟</div>
        <div class="prompt-sub">Toca la pantalla para comenzar la experiencia mágica</div>
    </div>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <linearGradient id="footprint-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff" />
                <stop offset="100%" stop-color="#f3e5ab" />
            </linearGradient>
        </defs>
    </svg>

    <div id="viewport">
        <div id="flash-screen"></div>
        <div class="sky-layer" id="sky"></div>
        <div class="moon" id="moon"></div>
        <canvas id="fxCanvas"></canvas>

        <div class="intro-container">
            <div class="typewriter-text" id="intro-text"></div>
        </div>

        <button class="btn-magico" id="start-reveal-btn">Comenzar la Revelación</button>

        <div class="characters-stage" id="stage">
            <div class="character-wrapper" id="char-bear">
                <div class="dialogue-bubble"></div>
                <svg class="char-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="55" r="30" fill="#a0522d"/>
                    <circle cx="28" cy="30" r="12" fill="#a0522d"/>
                    <circle cx="72" cy="30" r="12" fill="#a0522d"/>
                    <circle cx="28" cy="30" r="6" fill="#ffa07a"/>
                    <circle cx="72" cy="30" r="6" fill="#ffa07a"/>
                    <circle cx="50" cy="60" r="12" fill="#ffa07a"/>
                    <circle class="eye" cx="40" cy="48" r="3.5" fill="#000"/>
                    <circle class="eye" cx="60" cy="48" r="3.5" fill="#000"/>
                    <polygon points="46,56 54,56 50,61" fill="#000"/>
                </svg>
            </div>

            <div class="character-wrapper" id="char-bunny">
                <div class="dialogue-bubble"></div>
                <svg class="char-svg" viewBox="0 0 100 100">
                    <ellipse cx="50" cy="60" rx="26" ry="28" fill="#e0e0e0"/>
                    <ellipse cx="38" cy="28" rx="8" ry="24" fill="#e0e0e0" transform="rotate(-5 38 28)"/>
                    <ellipse cx="62" cy="28" rx="8" ry="24" fill="#e0e0e0" transform="rotate(5 62 28)"/>
                    <ellipse cx="38" cy="32" rx="4" ry="16" fill="#ffb6c1" transform="rotate(-5 38 32)"/>
                    <ellipse cx="62" cy="32" rx="4" ry="16" fill="#ffb6c1" transform="rotate(5 62 32)"/>
                    <circle class="eye" cx="42" cy="52" r="3" fill="#000"/>
                    <circle class="eye" cx="58" cy="52" r="3" fill="#000"/>
                    <polygon points="48,58 52,58 50,61" fill="#ffb6c1"/>
                </svg>
            </div>

            <div class="character-wrapper" id="char-penguin">
                <div class="dialogue-bubble"></div>
                <svg class="char-svg" viewBox="0 0 100 100">
                    <ellipse cx="50" cy="58" rx="26" ry="30" fill="#2c3e50"/>
                    <ellipse cx="50" cy="60" rx="18" ry="22" fill="#fff"/>
                    <circle class="eye" cx="42" cy="46" r="3.5" fill="#000"/>
                    <circle class="eye" cx="58" cy="46" r="3.5" fill="#000"/>
                    <polygon points="44,52 56,52 50,62" fill="#f1c40f"/>
                    <ellipse cx="32" cy="85" rx="10" ry="5" fill="#f1c40f"/>
                    <ellipse cx="68" cy="85" rx="10" ry="5" fill="#f1c40f"/>
                </svg>
            </div>

            <div class="character-wrapper" id="char-owl">
                <div class="dialogue-bubble"></div>
                <svg class="char-svg" viewBox="0 0 100 100">
                    <ellipse cx="50" cy="55" rx="28" ry="30" fill="#795548"/>
                    <circle cx="38" cy="45" r="10" fill="#fff"/>
                    <circle cx="62" cy="45" r="10" fill="#fff"/>
                    <circle class="eye" cx="38" cy="45" r="4" fill="#000"/>
                    <circle class="eye" cx="62" cy="45" r="4" fill="#000"/>
                    <polygon points="46,52 54,52 50,62" fill="#ff9800"/>
                    <polygon points="22,30 34,36 26,42" fill="#5d4037"/>
                    <polygon points="78,30 66,36 74,42" fill="#5d4037"/>
                </svg>
            </div>
        </div>

        <div id="box-stage">
            <div class="gift-box" id="interactive-box">
                <svg viewBox="0 0 200 200" width="100%" height="100%">
                    <defs>
                        <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ffd700" />
                            <stop offset="100%" stop-color="#b8860b" />
                        </linearGradient>
                    </defs>
                    <ellipse cx="100" cy="180" rx="60" ry="12" fill="rgba(0,0,0,0.4)" id="box-shadow"/>
                    <rect x="40" y="80" width="120" height="90" fill="url(#boxGrad)" rx="10" />
                    <rect x="90" y="80" width="20" height="90" fill="#ff3366" />
                    <g id="box-lid">
                        <rect x="34" y="60" width="132" height="25" fill="#ffe066" rx="5" />
                        <rect x="90" y="60" width="20" height="25" fill="#e6004c" />
                        <path d="M75,60 C60,30 90,30 95,60 Z" fill="#ff3366"/>
                        <path d="M125,60 C140,30 110,30 105,60 Z" fill="#ff3366"/>
                    </g>
                </svg>
            </div>
        </div>

        <div id="slot-machine-container">
            <div class="slot-header-text" id="slot-msg">MÁQUINA DEL DESTINO</div>
            <div class="reels-container">
                <div class="reel"><div class="reel-viewport" id="reel1"></div></div>
                <div class="reel"><div class="reel-viewport" id="reel2"></div></div>
                <div class="reel"><div class="reel-viewport" id="reel3"></div></div>
            </div>
            <div class="lever-mechanism" id="lever-control">
                <div class="lever-slot">
                    <div class="lever-stick" id="l-stick">
                        <div class="lever-ball"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gender = "boy"; 

        const AudioFX = {
            sounds: {
                bg: new Audio('https://actions.google.com/sounds/v1/music/gently_row.ogg'), 
                pop: new Audio('https://actions.google.com/sounds/v1/cartoon/cartoon_bubble_pop.ogg'),
                thud: new Audio('https://actions.google.com/sounds/v1/impacts/wood_heavy_thud.ogg'),
                lever: new Audio('https://actions.google.com/sounds/v1/foley/mechanical_switch.ogg'),
                spin: new Audio('https://actions.google.com/sounds/v1/foley/spinning_gears.ogg'),
                drum: new Audio('https://actions.google.com/sounds/v1/procedural/snare_drum_roll_medium.ogg'),
                win: new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg') 
            },
            init() {
                this.sounds.bg.loop = true;
                this.sounds.bg.volume = 0.4;
                this.sounds.spin.loop = true;
                this.sounds.spin.volume = 0.5;
            },
            play(key) {
                if(this.sounds[key]) {
                    this.sounds[key].currentTime = 0;
                    this.sounds[key].play().catch(() => {});
                }
            },
            stop(key) {
                if(this.sounds[key]) this.sounds[key].pause();
            }
        };

        const ParticleSystem = {
            canvas: document.getElementById('fxCanvas'),
            ctx: null,
            particles: [],
            activeMode: 'stars',
            init() {
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.generateInitialStars();
                this.loop();
            },
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },
            addParticle(p) {
                this.particles.push(p);
            },
            setMode(mode) {
                this.activeMode = mode;
            },
            generateInitialStars() {
                const count = window.innerWidth < 768 ? 80 : 180;
                for(let i = 0; i < count; i++) {
                    this.addParticle({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 2.5 + 0.5,
                        alpha: Math.random(),
                        speed: Math.random() * 0.01 + 0.003,
                        type: 'star'
                    });
                }
            },
            loop() {
                requestAnimationFrame(() => this.loop());
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                if (this.activeMode === 'stars' && this.particles.filter(p => p.type === 'star').length < 200) {
                    if(Math.random() < 0.3) {
                        this.addParticle({
                            x: Math.random() * this.canvas.width,
                            y: Math.random() * this.canvas.height,
                            size: Math.random() * 2.5 + 0.5,
                            alpha: 0,
                            speed: Math.random() * 0.01 + 0.003,
                            type: 'star'
                        });
                    }
                }

                if (this.activeMode.startsWith('smoke')) {
                    for(let i=0; i<3; i++) {
                        let color = '#a1c4fd'; 
                        if(this.activeMode === 'smoke-pink') color = '#ff9a9e';
                        if(this.activeMode === 'smoke-mix') color = Math.random() > 0.5 ? '#ff9a9e' : '#a1c4fd';
                        
                        this.addParticle({
                            x: this.canvas.width / 2 + (Math.random() * 30 - 15),
                            y: this.canvas.height / 2 + 30,
                            size: Math.random() * 8 + 4,
                            vx: Math.random() * 3 - 1.5,
                            vy: Math.random() * -4 - 1.5,
                            alpha: 1,
                            color: color,
                            type: 'smoke'
                        });
                    }
                }

                if (this.activeMode === 'celebration' && Math.random() < 0.5) {
                    this.addParticle({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 7 + 3,
                        vx: Math.random() * 6 - 3,
                        vy: Math.random() * -12 - 8,
                        color: gender === 'boy' ? `hsl(${210 + Math.random()*30}, 100%, 70%)` : `hsl(${330 + Math.random()*30}, 100%, 70%)`,
                        type: 'confetti',
                        rotation: Math.random() * 360,
                        rSpeed: Math.random() * 12 - 6
                    });
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];

                    if (p.type === 'star') {
                        p.alpha += p.speed;
                        if (p.alpha > 1 || p.alpha < 0) p.speed = -p.speed;
                        this.ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(p.alpha)})`;
                        this.ctx.fillRect(p.x, p.y, p.size, p.size);
                    } 
                    else if (p.type === 'smoke') {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.size += 0.3;
                        p.alpha -= 0.015;
                        if (p.alpha <= 0) { this.particles.splice(i, 1); continue; }
                        this.ctx.fillStyle = p.color;
                        this.ctx.globalAlpha = p.alpha;
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        this.ctx.fill();
                        this.ctx.globalAlpha = 1.0;
                    }
                    else if (p.type === 'confetti') {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.22; 
                        p.rotation += p.rSpeed;
                        if (p.y > this.canvas.height + 20) { this.particles.splice(i, 1); continue; }
                        this.ctx.save();
                        this.ctx.translate(p.x, p.y);
                        this.ctx.rotate(p.rotation * Math.PI / 180);
                        this.ctx.fillStyle = p.color;
                        this.ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                        this.ctx.restore();
                    }
                }
            }
        };

        const CinematicEngine = {
            introPhrases: [
                "✨ Hay momentos que cambian una vida para siempre...",
                "❤️ Hoy queremos compartir contigo uno de los momentos más especiales de nuestra vida.",
                "🌸 Un pequeño milagro está creciendo día a día.",
                "👨‍👩‍👦 Cada latido nos recuerda que una nueva aventura está por comenzar.",
                "🍼 Hoy descubrirás un secreto que hemos guardado con muchísimo amor.",
                "✨ Gracias por acompañarnos en este momento tan especial."
            ],
            phraseIndex: 0,
            
            init() {
                AudioFX.init();
                ParticleSystem.init();
                document.getElementById('start-prompt').addEventListener('click', () => this.startIntro(), { once: true });
                this.initSlotLever(); // Iniciar handler robusto para la palanca
            },

            startIntro() {
                gsap.to("#start-prompt", { opacity: 0, duration: 0.8, onComplete: () => document.getElementById('start-prompt').remove() });
                AudioFX.play('bg');
                gsap.to("#sky", { opacity: 1, duration: 2.5 });
                gsap.to("#moon", { opacity: 1, duration: 3.5, delay: 0.5 });
                this.triggerNextPhrase();
            },

            triggerNextPhrase() {
                if (this.phraseIndex < this.introPhrases.length) {
                    const textEl = document.getElementById('intro-text');
                    textEl.innerHTML = this.introPhrases[this.phraseIndex];
                    this.spawnFootprint();

                    let tl = gsap.timeline();
                    tl.to(textEl, { opacity: 1, duration: 1.2, filter: "blur(0px)" })
                      .to(textEl, { opacity: 0, duration: 1.2, filter: "blur(10px)", delay: 2.3, onComplete: () => {
                          this.phraseIndex++;
                          this.triggerNextPhrase();
                      }});
                } else {
                    this.enterCharacters();
                }
            },

            spawnFootprint() {
                const view = document.getElementById('viewport');
                const svgNS = "http://www.w3.org/2000/svg";
                const footprint = document.createElementNS(svgNS, "svg");
                footprint.setAttribute("class", "footprint");
                footprint.setAttribute("viewBox", "0 0 100 100");
                footprint.innerHTML = `<path d="M50,40 C35,40 30,60 40,75 C50,85 60,75 65,60 C65,45 58,40 50,40 Z M35,25 C40,25 40,35 35,35 C30,35 30,25 35,25 Z M50,15 C55,15 55,25 50,25 C45,25 45,15 50,15 Z M65,25 C70,25 70,35 65,35 C60,35 60,25 65,25 Z"/>`;
                
                let x = window.innerWidth * 0.15 + (this.phraseIndex * (window.innerWidth * 0.12));
                let y = window.innerHeight * 0.55 + (Math.sin(this.phraseIndex) * 50);
                
                footprint.style.left = `${x}px`;
                footprint.style.top = `${y}px`;
                footprint.style.transform = `rotate(${15 + (Math.random()*20)}deg)`;
                
                view.appendChild(footprint);
                AudioFX.play('pop');
                gsap.to(footprint, { opacity: 0.7, duration: 0.6, onComplete: () => {
                    gsap.to(footprint, { opacity: 0, duration: 1.5, delay: 1, onComplete: () => footprint.remove() });
                }});
            },

            enterCharacters() {
                const stage = document.getElementById('stage');
                stage.style.display = window.innerWidth < 768 ? 'grid' : 'flex';
                
                gsap.fromTo(".character-wrapper", 
                    { y: 200, opacity: 0 }, 
                    { y: 0, opacity: 1, duration: 1.2, staging: 0.3, ease: "back.out(1.5)", onComplete: () => this.startDialogues() }
                );
            },

            startDialogues() {
                // Aquí iría tu secuencia de diálogos previos a la aparición de la caja
                // Para no romper el flujo del script incompleto anterior, forzamos la aparición del botón mágico tras una breve pausa:
                setTimeout(() => {
                    const btn = document.getElementById('start-reveal-btn');
                    btn.style.display = 'block';
                    gsap.to(btn, { opacity: 1, duration: 0.8 });
                    btn.addEventListener('click', () => this.transitionToBox());
                }, 1000);
            },

            transitionToBox() {
                gsap.to("#stage, #start-reveal-btn", { opacity: 0, duration: 0.6, onComplete: () => {
                    document.getElementById('stage').style.display = 'none';
                    document.getElementById('start-reveal-btn').style.display = 'none';
                    this.showBox();
                }});
            },

            showBox() {
                const boxStage = document.getElementById('box-stage');
                boxStage.style.display = 'block';
                gsap.fromTo(boxStage, { scale: 0, rotation: -180 }, { scale: 1, rotation: 0, duration: 1.5, ease: "back.out(1.2)" });
                
                document.getElementById('interactive-box').addEventListener('click', () => this.transitionToSlot(), { once: true });
            },

            transitionToSlot() {
                AudioFX.play('thud');
                gsap.to("#box-stage", { scale: 0, duration: 0.5, onComplete: () => {
                    document.getElementById('box-stage').style.display = 'none';
                    this.showSlotMachine();
                }});
            },

            showSlotMachine() {
                const slotContainer = document.getElementById('slot-machine-container');
                slotContainer.style.display = 'flex';
                this.buildReels();
                gsap.to(slotContainer, { scale: 1, opacity: 1, duration: 0.8, ease: "back.out(1.2)" });
            },

            buildReels() {
                const items = ["🍼", "🧸", "👶", "👑", "🌟", "🎈"];
                const viewports = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
                
                viewports.forEach(vp => {
                    vp.innerHTML = '';
                    // Generamos bastantes elementos para simular el desplazamiento infinito continuo
                    for(let i=0; i<30; i++) {
                        let item = document.createElement('div');
                        item.className = 'reel-item';
                        item.innerText = items[i % items.length];
                        vp.appendChild(item);
                    }
                });
            },

            /* CONTROL DE ARRASTRE DE PALANCA RESISTENTE CON POINTER EVENTS */
            initSlotLever() {
                const leverControl = document.getElementById('lever-control');
                const stick = document.getElementById('l-stick');
                let isDragging = false;
                let startY = 0;
                const maxDrag = 60; // Límites físicos del recorrido visual
                let slotActive = false;

                leverControl.addEventListener('pointerdown', (e) => {
                    if (slotActive) return;
                    isDragging = true;
                    startY = e.clientY;
                    leverControl.setPointerCapture(e.pointerId);
                    AudioFX.play('lever');
                });

                leverControl.addEventListener('pointermove', (e) => {
                    if (!isDragging) return;
                    let deltaY = e.clientY - startY;
                    if (deltaY < 0) deltaY = 0;
                    if (deltaY > maxDrag) deltaY = maxDrag;
                    
                    // Rotación visual simulando anclaje mecánico en la base
                    gsap.set(stick, { rotationX: (deltaY / maxDrag) * -45, y: deltaY * 0.3 });

                    if (deltaY >= maxDrag - 5 && !slotActive) {
                        slotActive = true;
                        isDragging = false;
                        leverControl.releasePointerCapture(e.pointerId);
                        this.triggerSlotSpin(stick);
                    }
                });

                const endDrag = (e) => {
                    if (!isDragging) return;
                    isDragging = false;
                    gsap.to(stick, { rotationX: 0, y: 0, duration: 0.4, ease: "back.out(2)" });
                };

                leverControl.addEventListener('pointerup', endDrag);
                leverControl.addEventListener('pointercancel', endDrag);
            },

            triggerSlotSpin(stick) {
                // Recuperación elástica instantánea de la palanca mecánica
                gsap.to(stick, { rotationX: 0, y: 0, duration: 0.3, ease: "back.out(2)" });
                
                AudioFX.play('spin');
                AudioFX.play('drum');
                
                const finalSymbol = gender === "boy" ? "👦" : "👧";
                const viewports = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
                
                // Forzar el símbolo definitivo en posiciones estratégicas del reel
                viewports.forEach(vp => {
                    vp.children[vp.children.length - 3].innerText = finalSymbol;
                });

                let tl = gsap.timeline({ onComplete: () => this.triggerFinalReveal() });
                
                // Animación de desaceleración diferenciada por reel (Efecto Casino Premium)
                const itemHeight = window.innerWidth < 768 ? 90 : 120;
                const targetY = -(27 * itemHeight);

                tl.to("#reel1", { y: targetY, duration: 2.5, ease: "power4.out" }, 0)
                  .to("#reel2", { y: targetY, duration: 3.2, ease: "power4.out" }, 0.3)
                  .to("#reel3", { y: targetY, duration: 4.0, ease: "power4.out" }, 0.6);
            },

            triggerFinalReveal() {
                AudioFX.stop('spin');
                AudioFX.stop('drum');
                AudioFX.play('win');

                // Destello cinemático blanco en toda la pantalla
                gsap.to("#flash-screen", { opacity: 1, duration: 0.1, yoyo: true, repeat: 1 });
                
                document.getElementById('slot-msg').innerHTML = "🎉 ¡ES UN " + (gender === "boy" ? "NIÑO" : "NIÑA") + "! 🎉";
                document.getElementById('slot-msg').style.color = gender === "boy" ? "#a1c4fd" : "#ff9a9e";
                
                ParticleSystem.setMode('celebration');
            }
        };

        window.onload = () => CinematicEngine.init();
    </script>
</body>
</html>
